name: Test

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: cloud_storage_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d cloud_storage_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/cloud_storage
      TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/cloud_storage_test
      JWT_SECRET_KEY: ci-${{ github.run_id }}-${{ github.sha }}
      TEST_JWT_SECRET_KEY: test-${{ github.run_id }}-${{ github.sha }}
      REGISTRATION_OTP_SECRET_KEY: otp-${{ github.run_id }}-${{ github.sha }}
      REFRESH_TOKEN_SECRET_KEY: refresh-${{ github.run_id }}-${{ github.sha }}
      AUTH_THROTTLE_SECRET_KEY: throttle-${{ github.run_id }}-${{ github.sha }}
      MAX_UPLOAD_SIZE_BYTES: 64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Compile application
        run: python -m compileall app

      - name: Run migrations
        run: alembic upgrade head
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/cloud_storage_test

      - name: Check model and migration alignment
        run: alembic check
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/cloud_storage_test

      - name: Run tests
        run: pytest

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Test frontend cryptography
        working-directory: frontend
        run: npm test

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Run encrypted full-stack integration
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/cloud_storage_test
          VITE_API_URL: http://127.0.0.1:8000
          VITE_E2E_API_URL: http://127.0.0.1:8000
          VITE_E2E_SMTP_CAPTURE_URL: http://127.0.0.1:8026
          SMTP_HOST: 127.0.0.1
          SMTP_PORT: 8025
          SMTP_FROM_EMAIL: no-reply@example.com
          SMTP_AUTH: false
          SMTP_STARTTLS: false
        run: |
          python tests/smtp_capture_server.py &
          SMTP_PID=$!
          python -m uvicorn app.main:app --host 127.0.0.1 --port 8000 &
          API_PID=$!
          trap 'kill $API_PID $SMTP_PID' EXIT
          for attempt in {1..30}; do
            curl --fail --silent http://127.0.0.1:8000/ && break
            sleep 1
          done
          cd frontend
          npm run test:e2e
